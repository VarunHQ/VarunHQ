name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write   # 🔥 THIS FIXES THE ERROR

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: VarunHQ
          outputs: |
            dist/github-contribution-grid-snake-dark.svg

      - uses: peaceiris/actions-gh-pages@v4   # ✅ UPDATED ACTION
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
